<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - FinCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script> 
    
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="card login-card shadow-lg border-0 p-4 text-center">
        <h2 class="fw-bold text-primary mb-3"><i class="bi bi-cloud-check-fill me-2"></i>FinCloud</h2>
        <p class="text-muted mb-4">Quản lý tài chính cá nhân thông minh</p>
        
        <div class="mb-4 d-flex justify-content-center">
            <div class="g-recaptcha" data-sitekey="6LcugbUsAAAAAFgY5d-wepPYz_zOGAnzlc3jI2Y2"></div>
        </div>
        
        <button id="btnGoogleLogin" class="btn btn-outline-dark w-100 py-3 rounded-pill fw-bold shadow-sm d-flex align-items-center justify-content-center">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" class="me-2" id="googleIcon"/>
            <span id="btnText">Tiếp tục với Google</span>
        </button>
        
        <div id="errorMsg" class="text-danger mt-3 fw-bold d-none"></div>
    </div>

    <script type="module">
        import { auth, db } from './inc/config.js';
        import { GoogleAuthProvider, signInWithPopup, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
        import { doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';

        const provider = new GoogleAuthProvider();

        document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
            const errorDiv = document.getElementById('errorMsg');
            const btn = document.getElementById('btnGoogleLogin');
            const btnText = document.getElementById('btnText');
            const googleIcon = document.getElementById('googleIcon');

            errorDiv.classList.add('d-none');

            const recaptchaResponse = grecaptcha.getResponse();
            if (recaptchaResponse.length === 0) {
                errorDiv.innerText = "⚠️ Vui lòng xác nhận bạn không phải là robot!";
                errorDiv.classList.remove('d-none');
                return; 
            }

            try {
                btn.disabled = true;
                googleIcon.classList.add('d-none');
                btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang kết nối...';

                // Gọi Firebase Auth
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid, email: user.email, displayName: user.displayName,
                        photoURL: user.photoURL, role: 'user', status: 'active',
                        createdAt: serverTimestamp()
                    });
                    window.location.href = "index.html";
                } else {
                    const userData = userSnap.data();
                    if (userData.status === 'locked') {
                        await signOut(auth);
                        errorDiv.innerText = "Tài khoản của bạn đã bị khóa. Vui lòng liên hệ Admin!";
                        errorDiv.classList.remove('d-none');
                        
                        btn.disabled = false;
                        googleIcon.classList.remove('d-none');
                        btnText.innerText = 'Tiếp tục với Google';
                        grecaptcha.reset(); 
                        return;
                    }
                    window.location.href = userData.role === 'admin' ? "admin.html" : "index.html";
                }
            } catch (error) {
                errorDiv.innerText = "Lỗi đăng nhập: " + error.message;
                errorDiv.classList.remove('d-none');
                
                btn.disabled = false;
                googleIcon.classList.remove('d-none');
                btnText.innerText = 'Tiếp tục với Google';
                grecaptcha.reset(); 
            }
        });
    </script>
</body>
</html>
