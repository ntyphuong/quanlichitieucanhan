<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sửa danh mục - FinCloud</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-header {
            border-top-left-radius: 20px !important;
            border-top-right-radius: 20px !important;
            font-size: 18px;
        }
        
        .icon-preview-box {
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-right: none;
            border-top-left-radius: 0.375rem;
            border-bottom-left-radius: 0.375rem;
            font-size: 1.2rem;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="card card-custom">
        <div class="card-header bg-warning text-dark text-center fw-bold py-3">
            <i class="bi bi-pencil-square"></i> Chỉnh sửa danh mục
        </div>

        <div class="card-body p-4">
            <form id="formSua" action="danhmuc_sua_xuly.html" method="get">
                <input type="hidden" id="ID_An" />
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-123 text-primary"></i> Mã danh mục
                    </label>
                    <input type="text" class="form-control rounded-3 bg-light" id="MaDM" readonly />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-type-text text-success"></i> Tên danh mục mới
                    </label>
                    <input type="text" class="form-control rounded-3" id="TenDM" required />
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-emoji-smile text-warning"></i> Icon biểu tượng
                    </label>
                    
                    <div class="d-flex mb-2">
                        <div class="icon-preview-box" id="preview-container">
                            <i id="icon-preview" class="bi bi-star"></i>
                        </div>
                        <select class="form-select" style="border-top-left-radius: 0; border-bottom-left-radius: 0;" id="Icon" required>
                            <option value="">-- Chọn biểu tượng --</option>
                            <option value="bi-cart">🛒 Mua sắm (bi-cart)</option>
                            <option value="bi-cup-hot">☕ Ăn uống (bi-cup-hot)</option>
                            <option value="bi-house">🏠 Nhà cửa (bi-house)</option>
                            <option value="bi-gift">🎁 Quà tặng (bi-gift)</option>
                            <option value="bi-car-front">🚗 Di chuyển (bi-car-front)</option>
                            <option value="bi-piggy-bank">🐖 Tiết kiệm (bi-piggy-bank)</option>
                            <option value="bi-controller">🎮 Giải trí (bi-controller)</option>
                            <option value="custom" class="fw-bold text-primary">✨ Tự nhập mã Icon khác...</option>
                        </select>
                    </div>
                    
                    <div id="customIconDiv" class="d-none">
                        <input type="text" id="CustomIcon" class="form-control rounded-3" placeholder="Nhập mã icon (VD: bi-airplane)" />
                        <small class="text-muted d-block mt-1">
                            * Tìm mã Icon tại: <a href="https://icons.getbootstrap.com/" target="_blank" class="text-decoration-none">Bootstrap Icons</a>
                        </small>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="danhmuc.html" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <button type="submit" id="btnSubmit" class="btn btn-warning fw-bold">
                        <i class="bi bi-save"></i> Cập nhật ngay
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        const urlParams = new URLSearchParams(window.location.search);
        const docID = urlParams.get('id');

        $('#Icon').on('change', function() {
            const val = $(this).val();
            
            if (val === 'custom') {
                $('#customIconDiv').removeClass('d-none');
                $('#CustomIcon').prop('required', true).focus();
                
                // Lấy giá trị trong input nếu có để preview, không thì để icon bút chì
                const customVal = $('#CustomIcon').val().trim();
                $('#icon-preview').attr('class', 'bi ' + (customVal ? customVal : 'bi-pencil')); 
            } else {
                $('#customIconDiv').addClass('d-none');
                $('#CustomIcon').prop('required', false);
                
                if(val) {
                    $('#icon-preview').attr('class', 'bi ' + val);
                } else {
                    $('#icon-preview').attr('class', 'bi bi-star');
                }
            }
        });

        $('#CustomIcon').on('input', function() {
            const customVal = $(this).val().trim();
            if(customVal) {
                $('#icon-preview').attr('class', 'bi ' + customVal);
            } else {
                $('#icon-preview').attr('class', 'bi bi-pencil');
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "dangnhap.html";
                return;
            }

            if (!docID) {
                alert("Không tìm thấy dữ liệu để sửa!");
                window.location.href = "danhmuc.html";
                return;
            }

            try {
                const docRef = doc(db, 'danhmuc', docID);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    $('#ID_An').val(docSnap.id);
                    $('#MaDM').val(data.MaDM);
                    $('#TenDM').val(data.TenDM);
                    
                    const savedIcon = data.Icon;
                    
                    let iconExists = $(`#Icon option[value="${savedIcon}"]`).length > 0;

                    if (iconExists) {
                        $('#Icon').val(savedIcon).trigger('change');
                    } else if (savedIcon) {
                        $('#CustomIcon').val(savedIcon);
                        $('#Icon').val('custom').trigger('change');
                    }

                } else {
                    alert("Danh mục này không còn tồn tại!");
                    window.location.href = "danhmuc.html";
                }
            } catch (error) {
                console.error(error);
                alert("Lỗi tải dữ liệu: " + error.message);
            }
        });

        $('#formSua').on('submit', function(e) {
            e.preventDefault();
            
            let finalIcon = $('#Icon').val();
            if (finalIcon === 'custom') {
                finalIcon = $('#CustomIcon').val().trim();
            }
            
            localStorage.setItem('edit_id', $('#ID_An').val());
            localStorage.setItem('edit_ten', $('#TenDM').val());
            localStorage.setItem('edit_icon', finalIcon);

            const btn = $('#btnSubmit');
            btn.prop('disabled', true);
            btn.html('<span class="spinner-border spinner-border-sm"></span> Đang xử lý...');

            setTimeout(() => {
                this.submit();
            }, 300);
        });
    </script>
</body>
</html>
