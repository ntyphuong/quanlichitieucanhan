<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê chi tiêu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            max-width: 750px;
            margin: 40px auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="card">

    <h4 class="text-center mb-3">📊 Thống kê chi tiêu</h4>

    <div class="mb-3 d-flex justify-content-center gap-2">
        <input type="month" id="thang" class="form-control" style="max-width: 200px;">
        <button id="btnExport" class="btn btn-success fw-bold">
            📗 Xuất Excel
        </button>
    </div>

    <canvas id="myChart"></canvas>

    <h5 class="mt-4">📋 Chi tiết</h5>

    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th>Ngày</th>
                <th>Danh mục</th>
                <th>Số tiền</th>
                <th>Ghi chú</th>
            </tr>
        </thead>
        <tbody id="bang">
            <tr><td colspan="4" class="text-center">Đang tải...</td></tr>
        </tbody>
    </table>

</div>

<script type="module">
import { db, auth } from './inc/config.js';
import { collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

let chart;
let dataExcel = []; 

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "dangnhap.html";
        return;
    }

    // Mặc định tháng hiện tại
    let input = document.getElementById("thang");
    let now = new Date();
    input.value = now.toISOString().slice(0,7);

    loadData(user);

    input.addEventListener("change", () => loadData(user));
});

async function loadData(user) {

    let thang = document.getElementById("thang").value;

    // LẤY DANH MỤC
    const dmSnap = await getDocs(query(collection(db, "danhmuc"), where("uid", "==", user.uid)));
    let danhMucMap = {};

    dmSnap.forEach(doc => {
        danhMucMap[doc.id] = doc.data().TenDM;
    });

    // LẤY CHI TIÊU
    const ctSnap = await getDocs(query(collection(db, "chitieu"), where("uid", "==", user.uid)));

    let tong = {};
    let html = "";
    
    dataExcel = [];

    ctSnap.forEach(doc => {
        let data = doc.data();

        // LỌC THÁNG 
        let parts = data.ngay.split("-");
        let thangData = parts[0] + "-" + parts[1].padStart(2,'0');

        if (thangData !== thang) return;

        let tenDM = danhMucMap[data.danhmuc] || "Khác";

        if (!tong[tenDM]) tong[tenDM] = 0;
        tong[tenDM] += data.sotien;

        html += `
        <tr>
            <td>${data.ngay}</td>
            <td>${tenDM}</td>
            <td>${data.sotien.toLocaleString('vi-VN')} đ</td>
            <td>${data.ghichu || ""}</td>
        </tr>`;

        dataExcel.push({
            "Ngày": data.ngay,
            "Danh mục": tenDM,
            "Số tiền (VNĐ)": data.sotien,
            "Ghi chú": data.ghichu || ""
        });
    });

    document.getElementById("bang").innerHTML = html || `
    <tr><td colspan="4" class="text-center">Không có dữ liệu tháng này</td></tr>`;

    let labels = Object.keys(tong);
    let values = Object.values(tong);

    if (chart) chart.destroy();

    if(values.length > 0) {
        chart = new Chart(document.getElementById("myChart"), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: [
                        "#0d6efd", "#198754", "#ffc107", "#dc3545", "#6f42c1", "#0dcaf0"
                    ]
                }]
            }
        });
    }
}

// XỬ LÝ SỰ KIỆN XUẤT EXCEL
document.getElementById("btnExport").addEventListener("click", () => {
    if (dataExcel.length === 0) {
        alert("Không có dữ liệu để xuất Excel trong tháng này!");
        return;
    }

    // Tạo worksheet 
    const ws = XLSX.utils.json_to_sheet(dataExcel);

    const wscols = [
        {wch: 15}, // Ngày
        {wch: 25}, // Danh mục
        {wch: 20}, // Số tiền
        {wch: 40}  // Ghi chú
    ];
    ws['!cols'] = wscols;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Thống kê chi tiêu");


    let thang = document.getElementById("thang").value;
    
    // Tải file xuống
    XLSX.writeFile(wb, `ChiTieu_${thang}.xlsx`);
});

</script>

</body>
</html>
