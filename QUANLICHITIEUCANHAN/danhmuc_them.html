<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thêm danh mục - FinCloud</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-header {
            border-top-left-radius: 20px !important;
            border-top-right-radius: 20px !important;
            font-size: 18px;
        }
        
        .icon-preview-box {
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-right: none;
            border-top-left-radius: 0.375rem;
            border-bottom-left-radius: 0.375rem;
            font-size: 1.2rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="card card-custom">
        <div class="card-header bg-primary text-white text-center fw-bold py-3">
            <i class="bi bi-tags"></i> Thêm danh mục mới
        </div>

        <div class="card-body p-4">
            <form id="formThem" action="danhmuc_them_xuly.html" method="get">
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-123 text-primary"></i> Mã danh mục (Số)
                    </label>
                    <input type="number" class="form-control rounded-3" id="MaDM" required placeholder="Ví dụ: 1" min="1" />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-type-text text-success"></i> Tên danh mục
                    </label>
                    <input type="text" class="form-control rounded-3" id="TenDM" required placeholder="Ví dụ: Ăn uống" />
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-emoji-smile text-warning"></i> Icon biểu tượng
                    </label>
                    
                    <div class="d-flex mb-2">
                        <div class="icon-preview-box" id="preview-container">
                            <i id="icon-preview" class="bi bi-star"></i>
                        </div>
                        <select class="form-select" style="border-top-left-radius: 0; border-bottom-left-radius: 0;" id="Icon" required>
                            <option value="">-- Chọn biểu tượng --</option>
                            <option value="bi-cart">🛒 Mua sắm (bi-cart)</option>
                            <option value="bi-cup-hot">☕ Ăn uống (bi-cup-hot)</option>
                            <option value="bi-house">🏠 Nhà cửa (bi-house)</option>
                            <option value="bi-gift">🎁 Quà tặng (bi-gift)</option>
                            <option value="bi-car-front">🚗 Di chuyển (bi-car-front)</option>
                            <option value="bi-piggy-bank">🐖 Tiết kiệm (bi-piggy-bank)</option>
                            <option value="bi-controller">🎮 Giải trí (bi-controller)</option>
                            <option value="custom" class="text-primary fw-bold">✨ Tự nhập mã Icon khác...</option>
                        </select>
                    </div>

                    <div id="customIconDiv" class="d-none">
                        <input type="text" class="form-control" id="CustomIcon" placeholder="Nhập mã icon (VD: bi-airplane)" />
                        <small class="text-muted d-block mt-1">
                            * Tìm mã Icon tại: <a href="https://icons.getbootstrap.com/" target="_blank" class="text-decoration-none">Bootstrap Icons</a>
                        </small>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="danhmuc.html" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <button type="submit" id="btnSubmit" class="btn btn-primary px-4 fw-bold">
                        <i class="bi bi-save"></i> Lưu danh mục
                    </button>
                </div>
                
            </form>
        </div>
    </div>

    <script>
        $('#Icon').on('change', function() {
            const val = $(this).val();
            
            if (val === 'custom') {
                $('#customIconDiv').removeClass('d-none');
                $('#CustomIcon').attr('required', true).focus();
                $('#icon-preview').attr('class', 'bi bi-pencil'); 
            } else {

                $('#customIconDiv').addClass('d-none');
                $('#CustomIcon').removeAttr('required');
                
                if(val) {
                    $('#icon-preview').attr('class', 'bi ' + val);
                } else {
                    $('#icon-preview').attr('class', 'bi bi-star');
                }
            }
        });

        $('#CustomIcon').on('input', function() {
            const customVal = $(this).val().trim();
            if(customVal) {
                $('#icon-preview').attr('class', 'bi ' + customVal);
            } else {
                $('#icon-preview').attr('class', 'bi bi-pencil');
            }
        });

        // 3. Xử lý khi Submit form
        $('#formThem').on('submit', function(e) {
            e.preventDefault();

            const ma = $('#MaDM').val();
            const ten = $('#TenDM').val();
            let icon = $('#Icon').val();

            if (icon === 'custom') {
                icon = $('#CustomIcon').val().trim();
            }

            localStorage.setItem('maDM', ma);
            localStorage.setItem('tenDM', ten);
            localStorage.setItem('icon', icon);

            const btn = $('#btnSubmit');
            btn.prop('disabled', true);
            btn.html('<span class="spinner-border spinner-border-sm"></span> Đang xử lý...');

            setTimeout(() => {
                this.submit();
            }, 300);
        });
    </script>
</body>
</html>
