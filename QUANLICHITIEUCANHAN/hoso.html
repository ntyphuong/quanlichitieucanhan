<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hồ sơ cá nhân - FinCloud</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            max-width: 500px;
            margin: 80px auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(45deg, #0d6efd, #0dcaf0);
            height: 120px;
            position: relative;
        }

        .avatar-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .avatar-main {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            background: #eee;
        }

        .form-container {
            padding: 70px 30px 30px 30px;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="preview-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar-main" alt="Avatar">
                </div>
            </div>

            <div class="form-container">
                <h4 class="text-center fw-bold mb-1" id="display-name-title">Đang tải...</h4>
                <p class="text-center text-muted small mb-4" id="display-email">vui lòng chờ...</p>

                <form id="formHoso">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên hiển thị</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-primary"></i></span>
                            <input type="text" class="form-control border-start-0" id="InputName" required placeholder="Nhập tên của bạn">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Link ảnh đại diện (URL)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-image text-primary"></i></span>
                            <input type="url" class="form-control border-start-0" id="InputAvatar" placeholder="Dán link ảnh tại đây">
                        </div>
                        <small class="text-muted mt-1 d-block">Gợi ý: Bạn có thể dán link ảnh từ Facebook, Google hoặc bất kỳ trang nào.</small>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" id="btnSave" class="btn btn-primary fw-bold py-2 shadow-sm">
                            <i class="bi bi-check-circle me-2"></i> Cập nhật hồ sơ
                        </button>
                        <a href="index.html" class="btn btn-light text-muted py-2">Quay lại trang chủ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from './inc/config.js';
        import { onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        // Load Navbar
        $('#navbar').load('inc/navbar.html');

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Điền dữ liệu hiện tại vào form
                $('#display-name-title').text(user.displayName || "Người dùng mới");
                $('#display-email').text(user.email);
                $('#InputName').val(user.displayName || "");
                $('#InputAvatar').val(user.photoURL || "");
                
                if(user.photoURL) {
                    $('#preview-avatar').attr('src', user.photoURL);
                }
            } else {
                window.location.href = "dangnhap.html";
            }
        });

        // Xử lý khi bấm Lưu
        $('#formHoso').on('submit', async function(e) {
            e.preventDefault();
            
            const newName = $('#InputName').val();
            const newAvatar = $('#InputAvatar').val();
            const btn = $('#btnSave');

            btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Đang xử lý...');

            try {
                // Cập nhật thông tin lên Firebase Auth
                await updateProfile(auth.currentUser, {
                    displayName: newName,
                    photoURL: newAvatar
                });

                // Cập nhật giao diện preview ngay lập tức
                $('#display-name-title').text(newName);
                if(newAvatar) $('#preview-avatar').attr('src', newAvatar);

                alert("✅ Đã cập nhật hồ sơ thành công!");
                
                // Tải lại trang để đồng bộ thanh Navbar
                window.location.reload();

            } catch (error) {
                console.error(error);
                alert("❌ Lỗi: " + error.message);
            } finally {
                btn.prop('disabled', false).html('<i class="bi bi-check-circle me-2"></i> Cập nhật hồ sơ');
            }
        });

        // Preview ảnh khi dán URL vào
        $('#InputAvatar').on('input', function() {
            const url = $(this).val();
            if(url) {
                $('#preview-avatar').attr('src', url);
            } else {
                $('#preview-avatar').attr('src', 'https://cdn-icons-png.flaticon.com/512/149/149071.png');
            }
        });
    </script>
</body>
</html>
