<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đang cập nhật...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        /* Đồng bộ màu nền gradient */
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="card card-custom p-5">
        <div id="loading">
            <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status"></div>
            <h4 class="mt-4 text-warning fw-bold">Đang cập nhật...</h4>
            <p class="text-muted mb-0">Hệ thống đang lưu thay đổi của bạn, vui lòng đợi trong giây lát</p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        // Bảo mật: Kiểm tra xem người dùng còn đăng nhập không
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Lấy dữ liệu từ túi localStorage
                const id = localStorage.getItem('edit_id');
                const ten = localStorage.getItem('edit_ten');
                const icon = localStorage.getItem('edit_icon');

                if (!id) {
                    alert("Lỗi: Không tìm thấy dữ liệu để cập nhật!");
                    window.location.href = 'danhmuc.html';
                    return;
                }

                try {
                    // Delay 0.5 giây để hiển thị màn hình Loading mượt mà
                    setTimeout(async () => {
                        const docRef = doc(db, 'danhmuc', id);
                        
                        // Thực hiện cập nhật các trường lên Firestore
                        await updateDoc(docRef, {
                            TenDM: ten,
                            Icon: icon
                        });
                        
                        // Cập nhật xong thì dọn dẹp túi
                        localStorage.removeItem('edit_id');
                        localStorage.removeItem('edit_ten');
                        localStorage.removeItem('edit_icon');

                        // Chuyển về trang danh sách
                        window.location.href = 'danhmuc.html';
                    }, 500);

                } catch (error) {
                    console.error("Lỗi cập nhật:", error);
                    alert("Lỗi cập nhật: " + error.message);
                    window.location.href = 'danhmuc.html';
                }
            } else {
                alert("Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại!");
                window.location.href = 'dangnhap.html';
            }
        });
    </script>
</body>
</html>
