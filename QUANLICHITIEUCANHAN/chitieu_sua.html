<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sửa chi tiêu - FinCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e3f2fd, #ffffff); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-custom { width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .btn-primary { border-radius: 12px; padding: 12px; }
    </style>
</head>
<body>

<div class="card card-custom border-0">
    <div class="card-header bg-primary text-white text-center py-3">
        <h5 class="mb-0 fw-bold">Chỉnh Sửa Giao Dịch</h5>
    </div>
    <div class="card-body p-4">
        <div id="loadingForm" class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tải dữ liệu...</p>
        </div>

        <form id="formSua" class="d-none">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">NGÀY CHI TIÊU</label>
                <input type="date" id="ngay" class="form-control form-control-lg border-0 bg-light" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">DANH MỤC</label>
                <select id="danhmuc" class="form-select form-select-lg border-0 bg-light" required>
                    </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">SỐ TIỀN (VNĐ)</label>
                <input type="number" id="sotien" class="form-control form-control-lg border-0 bg-light" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">GHI CHÚ</label>
                <input type="text" id="ghichu" class="form-control form-control-lg border-0 bg-light" placeholder="Ăn sáng, mua đồ...">
            </div>

            <div class="d-grid gap-2">
                <button type="submit" id="btnSubmit" class="btn btn-primary fw-bold shadow-sm">
                    <i class="bi bi-save me-2"></i>LƯU THAY ĐỔI
                </button>
                <a href="chitieu.html" class="btn btn-link text-muted text-decoration-none">Hủy bỏ</a>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { db, auth } from './inc/config.js';
    import { doc, getDoc, updateDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "dangnhap.html"; return; }
        if (!id) { window.location.href = "chitieu.html"; return; }

        try {
            // 1. Tải danh mục của user trước
            const q = query(collection(db, "danhmuc"), where("uid", "==", user.uid));
            const catSnap = await getDocs(q);
            const select = document.getElementById("danhmuc");
            catSnap.forEach(d => {
                const data = d.data();
                select.innerHTML += `<option value="${d.id}" data-icon="${data.Icon || 'bi-receipt'}">${data.TenDM}</option>`;
            });

            // 2. Tải dữ liệu chi tiêu hiện tại
            const docRef = doc(db, "chitieu", id);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("ngay").value = data.ngay;
                document.getElementById("sotien").value = data.sotien;
                document.getElementById("ghichu").value = data.ghichu || "";
                document.getElementById("danhmuc").value = data.danhmucID;

                document.getElementById("loadingForm").classList.add("d-none");
                document.getElementById("formSua").classList.remove("d-none");
            } else {
                alert("Giao dịch không tồn tại!");
                window.location.href = "chitieu.html";
            }
        } catch (err) {
            console.error(err);
            alert("Lỗi tải dữ liệu!");
        }

        // 3. Xử lý Cập nhật
        document.getElementById("formSua").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Đang lưu...`;

            const sel = document.getElementById("danhmuc");
            const updateData = {
                ngay: document.getElementById("ngay").value,
                danhmucID: sel.value,
                tenDM: sel.options[sel.selectedIndex].text,
                icon: sel.options[sel.selectedIndex].getAttribute('data-icon'),
                sotien: parseFloat(document.getElementById("sotien").value),
                ghichu: document.getElementById("ghichu").value
            };

            try {
                await updateDoc(doc(db, "chitieu", id), updateData);
                window.location.href = "chitieu.html";
            } catch (err) {
                alert("Lỗi: " + err.message);
                btn.disabled = false;
                btn.innerText = "LƯU THAY ĐỔI";
            }
        });
    });
</script>
</body>
</html>
