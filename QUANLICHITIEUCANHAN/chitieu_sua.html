<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa chi tiêu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-header {
            border-top-left-radius: 20px !important;
            border-top-right-radius: 20px !important;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="card card-custom">

    <div class="card-header bg-warning text-dark text-center fw-bold py-3">
        <i class="bi bi-pencil-square"></i> Cập nhật chi tiêu
    </div>

    <div class="card-body p-4">

        <form id="formSua">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-calendar-date text-primary"></i> Ngày chi
                </label>
                <input type="date" id="ngay" class="form-control rounded-3" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-list text-primary"></i> Danh mục
                </label>
                <select id="danhmuc" class="form-select rounded-3" required>
                    <option value="">-- Chọn danh mục --</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-cash-stack text-success"></i> Số tiền
                </label>
                <input type="number" id="sotien" class="form-control rounded-3" min="0" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    <i class="bi bi-pencil text-warning"></i> Ghi chú
                </label>
                <textarea id="ghichu" class="form-control rounded-3" rows="2"></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="chitieu.html" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>

                <button type="submit" class="btn btn-warning fw-bold">
                    <i class="bi bi-save"></i> Lưu thay đổi
                </button>
            </div>

        </form>

    </div>
</div>

<script type="module">
import { db, auth } from './inc/config.js';
import { doc, getDoc, updateDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "dangnhap.html";
        return;
    }

    if (!id) {
        alert("Không tìm thấy dữ liệu để sửa!");
        window.location.href = "chitieu.html";
        return;
    }

    try {
        // 1. LOAD DANH SÁCH DANH MỤC TỪ FIRESTORE
        const q = query(collection(db, "danhmuc"), where("uid", "==", user.uid));
        const dmSnap = await getDocs(q);
        let select = document.getElementById("danhmuc");

        dmSnap.forEach(doc => {
            let data = doc.data();
            let option = document.createElement("option");
            option.value = doc.id;
            option.textContent = data.TenDM;
            select.appendChild(option);
        });

        // 2. LOAD THÔNG TIN CHI TIÊU CŨ
        const docRef = doc(db, "chitieu", id);
        const snap = await getDoc(docRef);

        if (snap.exists()) {
            let data = snap.data();

            document.getElementById("ngay").value = data.ngay;
            document.getElementById("sotien").value = data.sotien;
            document.getElementById("ghichu").value = data.ghichu || "";

            // Chọn đúng danh mục cũ
            let currentDM = data.danhmucID ? data.danhmucID : data.danhmuc;
            if (currentDM) {
                document.getElementById("danhmuc").value = currentDM;
            }
        } else {
            alert("Dữ liệu chi tiêu này không còn tồn tại!");
            window.location.href = "chitieu.html";
        }

        // 3. XỬ LÝ SỰ KIỆN CẬP NHẬT (SUBMIT)
        document.getElementById("formSua").addEventListener("submit", async (e) => {
            e.preventDefault();

            // Đã SỬA LỖI: Lấy giá trị từ các ô input tại thời điểm bấm nút
            let ngay = document.getElementById("ngay").value;
            let sotien = document.getElementById("sotien").value;
            let ghichu = document.getElementById("ghichu").value;

            let selectDM = document.getElementById("danhmuc");
            let danhmucID = selectDM.value;
            let tenDM = selectDM.options[selectDM.selectedIndex].text;

            // Hiệu ứng chống bấm 2 lần
            const submitBtn = document.querySelector("button[type='submit']");
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang lưu...';

            try {
                await updateDoc(doc(db, "chitieu", id), {
                    ngay: ngay,
                    danhmucID: danhmucID,
                    tenDM: tenDM,
                    sotien: parseFloat(sotien),
                    ghichu: ghichu.trim() || "" // Xóa khoảng trắng thừa 2 đầu
                });

                alert("✅ Cập nhật thành công!");
                window.location.href = "chitieu.html";
            } catch (error) {
                alert("Lỗi khi lưu: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-save"></i> Lưu thay đổi';
            }
        });

    } catch (error) {
        console.error("Lỗi hệ thống: ", error);
        alert("Có lỗi xảy ra khi tải dữ liệu: " + error.message);
    }
});
</script>

</body>
</html>
