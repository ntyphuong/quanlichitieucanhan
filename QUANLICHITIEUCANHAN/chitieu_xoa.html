<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa chi tiêu - FinCloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #ffebee, #ffffff); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-custom { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>

<div class="card card-custom p-4 border-0">
    <div id="xacnhan-box">
        <div class="mb-3">
            <i class="bi bi-exclamation-octagon text-danger" style="font-size: 4rem;"></i>
        </div>
        <h4 class="fw-bold text-danger">Xác nhận xóa?</h4>
        <p class="text-muted">Hành động này không thể hoàn tác. Bạn có chắc chắn muốn xóa giao dịch này không?</p>
        
        <div class="d-grid gap-2 mt-4">
            <button id="btn-xoa" class="btn btn-danger py-2 fw-bold rounded-pill shadow-sm">VẪN XÓA</button>
            <a href="chitieu.html" class="btn btn-light py-2 fw-bold rounded-pill">QUAY LẠI</a>
        </div>
    </div>

    <div id="loading-box" class="d-none py-4">
        <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5 class="mt-3 fw-bold text-danger">Đang xóa dữ liệu...</h5>
    </div>
</div>

<script type="module">
    import { db, auth } from './inc/config.js';
    import { doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "dangnhap.html"; return; }
        if (!id) { window.location.href = "chitieu.html"; return; }

        document.getElementById("btn-xoa").addEventListener("click", async () => {
            document.getElementById("xacnhan-box").classList.add("d-none");
            document.getElementById("loading-box").classList.remove("d-none");

            try {             
                await deleteDoc(doc(db, "chitieu", id));
                
                setTimeout(() => {
                    window.location.href = "chitieu.html";
                }, 500);
            } catch (error) {
                alert("Lỗi khi xóa: " + error.message);
                document.getElementById("xacnhan-box").classList.remove("d-none");
                document.getElementById("loading-box").classList.add("d-none");
            }
        });
    });
</script>
</body>
</html>
