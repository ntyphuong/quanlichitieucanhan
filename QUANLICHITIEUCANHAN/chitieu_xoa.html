<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa chi tiêu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffe3e3, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card card-custom p-4">

    <div id="xacnhan-box">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3.5rem;"></i>
        <h4 class="mt-3 text-danger fw-bold">Xác nhận xóa</h4>
        <p class="text-muted">Bạn có chắc chắn muốn xóa khoản chi tiêu này không?<br>Hành động này không thể hoàn tác.</p>
        
        <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="chitieu.html" class="btn btn-secondary px-4 fw-semibold">Hủy bỏ</a>
            <button id="btn-xoa" class="btn btn-danger px-4 fw-semibold">
                <i class="bi bi-trash"></i> Xóa ngay
            </button>
        </div>
    </div>

    <div id="loading-box" class="d-none">
        <div class="spinner-border text-danger mt-3" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-danger">Đang xóa dữ liệu...</h5>
        <p class="text-muted small">Vui lòng đợi trong giây lát</p>
    </div>

</div>

<script type="module">
import { db, auth } from './inc/config.js';
import { doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "dangnhap.html";
        return;
    }

    if (!id) {
        alert("Không tìm thấy dữ liệu để xóa!");
        window.location.href = "chitieu.html";
        return;
    }

    // Xử lý sự kiện khi người dùng bấm nút "Xóa ngay"
    document.getElementById("btn-xoa").addEventListener("click", async () => {
        
        // 1. Ẩn hộp xác nhận, Hiện hộp loading
        document.getElementById("xacnhan-box").classList.add("d-none");
        document.getElementById("loading-box").classList.remove("d-none");

        try {
            // 2. Gọi lệnh xóa trên Firebase
            await deleteDoc(doc(db, "chitieu", id));

            // 3. Xóa xong chuyển trang ngay lập tức (không cần dùng alert làm ngắt quãng nữa)
            window.location.href = "chitieu.html";

        } catch (error) {
            console.error("Lỗi khi xóa:", error);
            alert("❌ Đã xảy ra lỗi khi xóa: " + error.message);
            window.location.href = "chitieu.html";
        }
    });

});
</script>

</body>
</html>
