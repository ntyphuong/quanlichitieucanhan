<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa danh mục - FinCloud</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* Nền màu đỏ nhạt cảnh báo việc xóa dữ liệu */
        body {
            background: linear-gradient(135deg, #ffe3e3, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card card-custom p-4">
    <div id="xacnhan-box">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3.5rem;"></i>
        <h4 class="mt-3 text-danger fw-bold">Xóa danh mục</h4>
        <p class="text-muted">Bạn có chắc chắn muốn xóa danh mục này không?<br>Hành động này không thể hoàn tác.</p>
        
        <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="danhmuc.html" class="btn btn-secondary px-4 fw-semibold">Hủy bỏ</a>
            <button id="btn-xoa" class="btn btn-danger px-4 fw-semibold">
                <i class="bi bi-trash"></i> Xóa ngay
            </button>
        </div>
    </div>

    <div id="loading-box" class="d-none">
        <div class="spinner-border text-danger mt-3" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-danger fw-bold">Đang xóa dữ liệu...</h5>
        <p class="text-muted mb-0">Hệ thống đang xử lý, vui lòng đợi</p>
    </div>
</div>

<script type="module">
    import { db, auth } from './inc/config.js';
    import { doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    const urlParams = new URLSearchParams(window.location.search);
    const docID = urlParams.get('id');

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "dangnhap.html";
            return;
        }

        if (!docID) {
            alert("Không tìm thấy dữ liệu để xóa!");
            window.location.href = "danhmuc.html";
            return;
        }

        document.getElementById("btn-xoa").addEventListener("click", async () => {
            document.getElementById("xacnhan-box").classList.add("d-none");
            document.getElementById("loading-box").classList.remove("d-none");

            try {

                setTimeout(async () => {
                    await deleteDoc(doc(db, 'danhmuc', docID));
                    
                    window.location.href = 'danhmuc.html';
                }, 500);

            } catch (error) {
                console.error("Lỗi khi xóa:", error);
                alert("❌ Đã xảy ra lỗi khi xóa: " + error.message);
                window.location.href = 'danhmuc.html';
            }
        });
    });
</script>

</body>
</html>
