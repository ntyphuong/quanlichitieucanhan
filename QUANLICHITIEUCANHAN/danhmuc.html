<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý danh mục</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }
        /* Hiệu ứng cho mỗi ô danh mục */
        .category-card {
            transition: all 0.3s ease;
            border-radius: 16px;
            overflow: hidden;
        }
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1) !important;
        }
        /* Vòng tròn chứa Icon */
        .icon-circle {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0f2fe, #f1f5f9);
            margin: 0 auto 15px auto;
            transition: all 0.3s ease;
        }
        .category-card:hover .icon-circle {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
        }
        .category-card:hover .icon-circle i {
            color: white !important;
        }
        /* Nút hành động (Sửa/Xóa) */
        .action-btns {
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .category-card:hover .action-btns {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container mt-4 pb-5">
        
        <div id="navbar"></div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
            <h4 class="text-primary fw-bold mb-0">
                <i class="bi bi-grid-fill me-2"></i>Danh mục của tôi
            </h4>
            <a href="danhmuc_them.html" class="btn btn-success shadow-sm rounded-pill px-4 fw-bold">
                <i class="bi bi-plus-lg me-1"></i> Thêm mới
            </a>
        </div>

        <div class="row g-4" id="HienThi">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Đang tải danh mục...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        // Tải Navbar nếu có
        $(function(){
            $('#navbar').load('inc/navbar.html');
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "dangnhap.html";
                return;
            }

            try {
                // Truy vấn danh mục của user hiện tại
                const q = query(collection(db, "danhmuc"), where("uid", "==", user.uid));
                const snapshot = await getDocs(q);

                let html = "";

                if (snapshot.empty) {
                    html = `
                    <div class="col-12 text-center py-5">
                        <img src="https://cdn-icons-png.flaticon.com/512/7486/7486754.png" width="120" class="opacity-50 mb-3">
                        <h5 class="text-muted">Bạn chưa có danh mục nào</h5>
                        <a href="danhmuc_them.html" class="btn btn-outline-primary mt-2">Tạo danh mục đầu tiên</a>
                    </div>`;
                } else {
                    snapshot.forEach(docSnap => {
                        let data = docSnap.data();
                        
                        // Xử lý Icon: Nếu không có icon thì dùng icon thư mục mặc định
                        let iconClass = data.icon || data.Icon || "bi bi-folder2-open"; 

                        html += `
                        <div class="col-6 col-md-4 col-lg-3">
                            <div class="card category-card border-0 shadow-sm h-100 text-center">
                                <div class="card-body p-4">
                                    
                                    <div class="icon-circle shadow-sm">
                                        <i class="${iconClass} fs-1 text-primary"></i>
                                    </div>
                                    
                                    <h5 class="fw-bold text-dark mb-1 text-truncate" title="${data.TenDM}">${data.TenDM}</h5>
                                    
                                    <small class="text-muted d-block mb-3">Mã: ${docSnap.id.substring(0, 5)}...</small>

                                    <div class="action-btns d-flex justify-content-center gap-2 mt-auto">
                                        <a href="danhmuc_sua.html?id=${docSnap.id}" class="btn btn-sm btn-light text-primary rounded-circle" style="width:35px; height:35px; display:flex; align-items:center; justify-content:center;" title="Sửa">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        <a href="danhmuc_xoa.html?id=${docSnap.id}" class="btn btn-sm btn-light text-danger rounded-circle" style="width:35px; height:35px; display:flex; align-items:center; justify-content:center;" title="Xóa">
                                            <i class="bi bi-trash-fill"></i>
                                        </a>
                                    </div>

                                </div>
                            </div>
                        </div>`;
                    });
                }

                document.getElementById("HienThi").innerHTML = html;

            } catch (error) {
                console.error("Lỗi tải danh mục:", error);
                document.getElementById("HienThi").innerHTML = `<div class="col-12 text-center text-danger">Lỗi tải dữ liệu!</div>`;
            }
        });
    </script>
</body>
</html>
