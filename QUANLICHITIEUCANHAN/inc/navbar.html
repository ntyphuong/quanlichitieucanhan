<script>
    // JS nhỏ xíu để tự động làm sáng (active) menu đang được chọn
    $(document).ready(function() {
        let currentPath = window.location.pathname.split('/').pop() || 'index.html';
        if(currentPath.includes('chitieu')) $('#nav-chitieu').addClass('active bg-white text-primary fw-bold');
        else if(currentPath.includes('danhmuc')) $('#nav-danhmuc').addClass('active bg-white text-primary fw-bold');
        else $('#nav-index').addClass('active bg-white text-primary fw-bold');
    });
</script>

<script type="module">
    import { auth } from './inc/config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    // 1. Tự động lấy Tên và Avatar điền vào Navbar
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const elName = document.getElementById('user-name');
            const elAvatar = document.getElementById('user-avatar');
            
            if(elName) elName.innerText = user.displayName || "Người dùng";
            if(elAvatar) elAvatar.src = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        }
    });

    // 2. Lắng nghe sự kiện click vào nút Đăng xuất
    document.body.addEventListener('click', async function(e) {
        // Kiểm tra xem phần tử bị click có phải là nút Đăng xuất (hoặc nằm trong nút đó) không
        if (e.target.closest('#btn-logout')) {
            e.preventDefault(); // Chặn trang bị giật/tải lại
            
            if (confirm("Bạn có chắc chắn muốn đăng xuất khỏi hệ thống?")) {
                try {
                    // Gọi hàm đăng xuất của Firebase
                    await signOut(auth);
                    
                    // Đá thẳng về trang đăng nhập
                    window.location.href = "dangnhap.html";
                } catch (error) {
                    console.error("Lỗi đăng xuất:", error);
                    alert("Đã xảy ra lỗi, vui lòng thử lại!");
                }
            }
        }
    });
</script>
