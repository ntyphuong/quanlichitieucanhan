<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm chi tiêu - FinCloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e3f2fd, #ffffff); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-custom { width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .btn-primary { border-radius: 12px; padding: 12px; }
    </style>
</head>
<body>

<div class="card card-custom border-0">
    <div class="card-header bg-primary text-white text-center py-3">
        <h5 class="mb-0 fw-bold">Thêm Giao Dịch Mới</h5>
    </div>
    <div class="card-body p-4">
        <form id="formThem">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">NGÀY CHI TIÊU</label>
                <input type="date" id="ngay" class="form-control form-control-lg border-0 bg-light" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">DANH MỤC</label>
                <select id="danhmuc" class="form-select form-select-lg border-0 bg-light" required>
                    <option value="">-- Chọn danh mục --</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">SỐ TIỀN (VNĐ)</label>
                <input type="number" id="sotien" class="form-control form-control-lg border-0 bg-light" placeholder="0" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">GHI CHÚ</label>
                <input type="text" id="ghichu" class="form-control form-control-lg border-0 bg-light" placeholder="Ăn sáng, mua đồ...">
            </div>

            <div class="d-grid gap-2">
                <button type="submit" id="btnSubmit" class="btn btn-primary fw-bold shadow-sm">
                    <i class="bi bi-check-circle me-2"></i>LƯU CHI TIÊU
                </button>
                <a href="chitieu.html" class="btn btn-link text-muted text-decoration-none">Quay lại</a>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { db, auth } from './inc/config.js';
    import { collection, addDoc, query, where, getDocs, doc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    // Đặt ngày mặc định là hôm nay
    document.getElementById('ngay').valueAsDate = new Date();

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "dangnhap.html"; return; }

        // Tải danh mục của user
        const q = query(collection(db, "danhmuc"), where("uid", "==", user.uid));
        const snap = await getDocs(q);
        const select = document.getElementById("danhmuc");
        snap.forEach(doc => {
            const data = doc.data();
            // Lưu icon vào attribute để lát lấy cho nhanh
            select.innerHTML += `<option value="${doc.id}" data-icon="${data.Icon || 'bi-receipt'}">${data.TenDM}</option>`;
        });

        // Xử lý Lưu
        document.getElementById("formThem").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Đang lưu...`;

            const sel = document.getElementById("danhmuc");
            const data = {
                uid: user.uid,
                ngay: document.getElementById("ngay").value,
                danhmucID: sel.value,
                tenDM: sel.options[sel.selectedIndex].text,
                icon: sel.options[sel.selectedIndex].getAttribute('data-icon'),
                sotien: parseFloat(document.getElementById("sotien").value),
                ghichu: document.getElementById("ghichu").value,
                createdAt: new Date()
            };

            try {
                await addDoc(collection(db, "chitieu"), data);
                
                // Cập nhật ngân sách (nếu bạn có tính năng này)
                // await updateDoc(doc(db, "ngansach", "ID_CUA_BAN"), { sodu: increment(-data.sotien) });

                window.location.href = "chitieu.html";
            } catch (err) {
                alert("Lỗi: " + err.message);
                btn.disabled = false;
                btn.innerText = "LƯU CHI TIÊU";
            }
        });
    });
</script>
</body>
</html>
