<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đang xử lý...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        /* Đồng bộ màu nền gradient giống trang Thêm danh mục */
        body {
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card-custom {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="card card-custom p-5">
        <div id="loading">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <h4 class="mt-4 text-primary fw-bold">Đang lưu dữ liệu...</h4>
            <p class="text-muted mb-0">Hệ thống đang đồng bộ lên Cloud, vui lòng đợi trong giây lát</p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        // Kiểm tra trạng thái đăng nhập
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Lấy dữ liệu từ localStorage ra
                const maDM = localStorage.getItem('maDM');
                const tenDM = localStorage.getItem('tenDM');
                const icon = localStorage.getItem('icon');

                // Kiểm tra nếu rỗng thì bắt quay lại trang nhập
                if (!maDM || !tenDM) {
                    alert("Lỗi: Không tìm thấy dữ liệu để lưu!");
                    window.location.href = 'danhmuc_them.html';
                    return;
                }

                try {
                    // Cố tình tạo một độ trễ nhỏ (500ms) để giao diện Loading hiện lên mượt mà 
                    // (Tránh mạng quá nhanh nó nháy màn hình cái dập làm người dùng chói mắt)
                    setTimeout(async () => {
                        // 2. Tiến hành lưu lên Firestore
                        await setDoc(doc(db, 'danhmuc', maDM.padStart(5, '0')), {
                            MaDM: maDM,
                            TenDM: tenDM,
                            Icon: icon,
                            uid: user.uid // Lưu kèm ID người dùng
                        });

                        // 3. Dọn dẹp localStorage cho sạch máy
                        localStorage.removeItem('maDM');
                        localStorage.removeItem('tenDM');
                        localStorage.removeItem('icon');

                        // 4. Về thẳng trang danh sách (không cần hiện alert nữa vì đã có màn hình chờ)
                        window.location.href = 'danhmuc.html';
                    }, 500);

                } catch (error) {
                    console.error("Lỗi Firestore:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                    window.location.href = 'danhmuc_them.html';
                }
            } else {
                // Nếu chưa đăng nhập thì đuổi ra trang đăng nhập
                alert("Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại!");
                window.location.href = 'dangnhap.html';
            }
        });
    </script>
</body>
</html>
