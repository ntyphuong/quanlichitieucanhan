<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đang xử lý...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background: linear-gradient(135deg, #e3f2fd, #ffffff); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-custom { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; }
    </style>
</head>
<body>
    <div class="card card-custom p-5">
        <div id="loading">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <h4 class="mt-4 text-primary fw-bold">Đang lưu danh mục...</h4>
            <p class="text-muted">Vui lòng đợi trong giây lát</p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const maDM = localStorage.getItem('maDM');
                const tenDM = localStorage.getItem('tenDM');
                const icon = localStorage.getItem('icon');

                if (!maDM || !tenDM) {
                    alert("Thiếu dữ liệu!");
                    window.location.href = 'danhmuc_them.html';
                    return;
                }

                try {
                    setTimeout(async () => {
                        // BƯỚC QUAN TRỌNG: Dùng addDoc để Firebase tự tạo ID ngẫu nhiên, không lo trùng mã
                        await addDoc(collection(db, 'danhmuc'), {
                            MaDM: maDM,
                            TenDM: tenDM,
                            Icon: icon || "bi-tag",
                            uid: user.uid, // Gắn ID người dùng để bảo mật
                            createdAt: new Date()
                        });

                        localStorage.removeItem('maDM');
                        localStorage.removeItem('tenDM');
                        localStorage.removeItem('icon');

                        window.location.href = 'danhmuc.html';
                    }, 500);
                } catch (error) {
                    console.error("Lỗi Firestore:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                    window.location.href = 'danhmuc_them.html';
                }
            } else {
                window.location.href = 'dangnhap.html';
            }
        });
    </script>
</body>
</html>
