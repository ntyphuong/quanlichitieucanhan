<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinCloud - Tổng quan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .summary-card { transition: transform 0.2s; border-radius: 15px; }
        .summary-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
        .action-btn { transition: all 0.2s; }
        .action-btn:hover { transform: scale(1.03); }
        .chart-container { position: relative; height: 250px; width: 100%; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-3 pb-5">
        
        <div id="navbar"></div>

        <div id="loading-screen" class="text-center mt-5 pt-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold">Đang tải dữ liệu...</p>
        </div>

        <div id="main-content" class="d-none mt-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold text-primary mb-1">Xin chào, <span id="userName" class="text-dark">Bạn</span>! 👋</h3>
                    <p class="text-muted mb-0">Tháng <span id="thangHienTaiTxt" class="fw-bold text-dark"></span></p>
                </div>
                <button class="btn btn-outline-primary rounded-pill fw-bold shadow-sm" onclick="window.location.href='ngansach.html'">
                    <i class="bi bi-wallet2 me-1"></i> Ngân sách
                </button>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card summary-card shadow-sm border-0 bg-info bg-opacity-10 h-100 p-3">
                        <h6 class="text-info fw-bold text-uppercase mb-2">Ngân sách</h6>
                        <h3 class="fw-bold text-dark mb-0" id="txtNganSach">0 đ</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card summary-card shadow-sm border-0 bg-danger text-white h-100 p-3" style="cursor:pointer;" onclick="window.location.href='chitieu.html'">
                        <h6 class="text-white-50 fw-bold text-uppercase mb-2">Đã chi <i class="bi bi-box-arrow-up-right ms-1 small"></i></h6>
                        <h3 class="fw-bold mb-0" id="txtDaChi">0 đ</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card summary-card shadow-sm border-0 bg-success text-white h-100 p-3">
                        <h6 class="text-white-50 fw-bold text-uppercase mb-2">Còn lại</h6>
                        <h3 class="fw-bold mb-0" id="txtConLai">0 đ</h3>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-5">
                <div class="col-6 col-md-4">
                    <a href="chitieu_them.html" class="btn btn-outline-danger w-100 py-3 rounded-4 fw-bold action-btn shadow-sm">
                        <i class="bi bi-dash-circle fs-2 d-block mb-2"></i> Thêm chi tiêu
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="chitieu.html" class="btn btn-outline-primary w-100 py-3 rounded-4 fw-bold action-btn shadow-sm">
                        <i class="bi bi-list-columns-reverse fs-2 d-block mb-2"></i> Lịch sử
                    </a>
                </div>
                <div class="col-12 col-md-4">
                    <a href="danhmuc.html" class="btn btn-outline-success w-100 py-3 rounded-4 fw-bold action-btn shadow-sm">
                        <i class="bi bi-grid fs-2 d-block mb-2"></i> Quản lý danh mục
                    </a>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 h-100 rounded-4">
                        <div class="card-body"><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 h-100 rounded-4">
                        <div class="card-body"><div class="chart-container"><canvas id="cateChart"></canvas></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './inc/config.js';
        import { collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

        $(function(){ $('#navbar').load('inc/navbar.html'); });

        const formatMoney = (amount) => new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
        const date = new Date();
        const currentMonthStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('thangHienTaiTxt').innerText = `${date.getMonth() + 1}/${date.getFullYear()}`;

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "dangnhap.html"; return; }

            // BẢO VỆ ĐI TUẦN: Kiểm tra khóa tài khoản
            try {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists() && userSnap.data().status === 'locked') {
                    alert("Tài khoản của bạn đã bị khóa bởi Admin!");
                    await signOut(auth);
                    window.location.href = "dangnhap.html";
                    return;
                }
            } catch (error) { console.error(error); }

            currentUser = user;
            document.getElementById('userName').innerText = user.displayName || 'Bạn';
            await loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                const budgetRef = doc(db, "ngansach", `${currentUser.uid}_${currentMonthStr}`);
                const budgetSnap = await getDoc(budgetRef);
                let nganSach = budgetSnap.exists() ? budgetSnap.data().sotien : 0;

                const qCT = query(collection(db, "chitieu"), where("uid", "==", currentUser.uid));
                const snapCT = await getDocs(qCT);
                
                let daChi = 0, dailyTotals = {}, categoryTotals = {};
                for(let i=6; i>=0; i--) { let d=new Date(); d.setDate(d.getDate()-i); dailyTotals[d.toISOString().split('T')[0]] = 0; }

                snapCT.forEach(doc => {
                    let d = doc.data(), st = d.sotien || 0;
                    if (d.ngay && d.ngay.startsWith(currentMonthStr)) daChi += st;
                    if (dailyTotals[d.ngay] !== undefined) dailyTotals[d.ngay] += st;
                    let dm = d.tenDM || d.danhmuc || "Chưa phân loại";
                    categoryTotals[dm] = (categoryTotals[dm] || 0) + st;
                });

                let conLai = nganSach - daChi;
                document.getElementById('txtNganSach').innerText = formatMoney(nganSach);
                document.getElementById('txtDaChi').innerText = formatMoney(daChi);
                document.getElementById('txtConLai').innerText = formatMoney(conLai);

                const cCard = document.getElementById('txtConLai').closest('.card');
                if (conLai < 0) { cCard.className = 'card summary-card shadow-sm border-0 bg-warning text-danger h-100 p-3'; } 
                else { cCard.className = 'card summary-card shadow-sm border-0 bg-success text-white h-100 p-3'; }

                drawCharts(dailyTotals, categoryTotals);
            } catch(e) { console.error(e); }
            
            document.getElementById('loading-screen').classList.add('d-none');
            document.getElementById('main-content').classList.remove('d-none');
        }

        let chart1=null, chart2=null;
        function drawCharts(dT, cT) {
            if(chart1) chart1.destroy(); if(chart2) chart2.destroy();
            chart1 = new Chart(document.getElementById('dailyChart'), { type: 'bar', data: { labels: Object.keys(dT).map(d=>d.substring(5)), datasets: [{ label: 'VNĐ', data: Object.values(dT), backgroundColor: '#36a2eb', borderRadius: 5 }] }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }});
            chart2 = new Chart(document.getElementById('cateChart'), { type: 'doughnut', data: { labels: Object.keys(cT).length ? Object.keys(cT) : ["Trống"], datasets: [{ data: Object.values(cT).length ? Object.values(cT) : [1], backgroundColor: Object.values(cT).length ? ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff','#ff9f40'] : ['#e9ecef'], borderWidth: 0 }] }, options: { responsive:true, maintainAspectRatio:false, cutout:'65%' }});
        }
    </script>
</body>
</html>
