<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sổ chi tiêu - FinCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f4f6f9; }
        .transaction-item:hover { background-color: #f8f9fa; }
        .icon-box { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: #fff3cd; color: #ffc107; }
    </style>
</head>
<body>
<div class="container mt-3 pb-5">
    <div id="navbar"></div>

    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
        <h4 class="text-primary fw-bold mb-0"><i class="bi bi-wallet2 me-2"></i>Sổ chi tiêu</h4>
        <a href="chitieu_them.html" class="btn btn-success shadow-sm rounded-pill px-4 fw-bold"><i class="bi bi-plus-lg me-1"></i> Thêm</a>
    </div>

    <div id="HienThi"><div class="text-center py-5"><div class="spinner-border text-primary"></div></div></div>
</div>

<script type="module">
import { db, auth } from './inc/config.js';
import { collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

$(function(){ $('#navbar').load('inc/navbar.html'); });
const formatMoney = (amount) => new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
const getDayOfWeek = (dateString) => {
    const days = ['CN', 'Th 2', 'Th 3', 'Th 4', 'Th 5', 'Th 6', 'Th 7'];
    const d = new Date(dateString);
    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')} (${days[d.getDay()]})`;
};

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "dangnhap.html"; return; }

    // BẢO VỆ ĐI TUẦN
    const userSnap = await getDoc(doc(db, "users", user.uid));
    if (userSnap.exists() && userSnap.data().status === 'locked') {
        alert("Tài khoản của bạn đã bị khóa!"); await signOut(auth); window.location.href = "dangnhap.html"; return;
    }

    try {
        const q = query(collection(db, "chitieu"), where("uid", "==", user.uid));
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("HienThi").innerHTML = `<div class="text-center py-5">Chưa có dữ liệu</div>`; return; }

        let txs = []; snap.forEach(d => txs.push({id: d.id, ...d.data()}));
        txs.sort((a, b) => b.ngay.localeCompare(a.ngay));

        let grouped = {};
        txs.forEach(tx => {
            if (!grouped[tx.ngay]) grouped[tx.ngay] = { total: 0, items: [] };
            grouped[tx.ngay].items.push(tx); grouped[tx.ngay].total += tx.sotien;
        });

        let html = "";
        for (const [date, group] of Object.entries(grouped)) {
            html += `<div class="card shadow-sm mb-4 border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-light border-bottom-0 d-flex justify-content-between py-3">
                    <span class="fw-bold text-secondary">${getDayOfWeek(date)}</span><span class="fw-bold">- ${formatMoney(group.total)}</span>
                </div><ul class="list-group list-group-flush">`;
            
            group.items.forEach(item => {
                let note = item.ghichu ? `<span class="text-muted small ms-2">${item.ghichu}</span>` : "";
                html += `<li class="list-group-item transaction-item d-flex justify-content-between align-items-center py-3">
                    <div class="d-flex align-items-center"><div class="icon-box me-3"><i class="bi bi-receipt"></i></div><div><h6 class="mb-0 fw-bold">${item.tenDM || item.danhmuc || 'Khác'} ${note}</h6></div></div>
                    <div class="d-flex align-items-center"><span class="fw-bold text-danger me-3">${formatMoney(item.sotien)}</span>
                        <div class="dropdown"><button class="btn btn-sm btn-light rounded-circle" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                            <li><a class="dropdown-item text-primary" href="chitieu_sua.html?id=${item.id}">Sửa</a></li>
                            <li><a class="dropdown-item text-danger" href="chitieu_xoa.html?id=${item.id}">Xóa</a></li>
                        </ul></div>
                    </div></li>`;
            });
            html += `</ul></div>`;
        }
        document.getElementById("HienThi").innerHTML = html;
    } catch (e) { console.error(e); }
});
</script>
</body>
</html>
