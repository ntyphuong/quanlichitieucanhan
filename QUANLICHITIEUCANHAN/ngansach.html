<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ngân sách - FinCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style> body { background-color: #f4f6f9; } .progress { height: 25px; border-radius: 20px; } </style>
</head>
<body>
<div class="container mt-3 pb-5">
    <div id="navbar"></div>
    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
        <h4 class="text-primary fw-bold mb-0"><i class="bi bi-piggy-bank me-2"></i>Ngân sách</h4>
        <a href="index.html" class="btn btn-outline-secondary shadow-sm rounded-pill px-3">Trở về</a>
    </div>

    <div id="loading-screen" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

    <div id="main-content" class="d-none">
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted fw-bold">Đã chi: <span id="txtDaChi" class="text-danger">0 đ</span></span>
                    <span class="text-muted fw-bold">Ngân sách: <span id="txtNganSach" class="text-info">0 đ</span></span>
                </div>
                <div class="progress mb-3 shadow-sm"><div id="progressBar" class="progress-bar bg-success" style="width: 0%;">0%</div></div>
                <div class="text-center mt-3"><h5 class="mb-0 text-muted">Còn lại: <span id="txtConLai" class="fw-bold text-success fs-3">0 đ</span></h5></div>
            </div>
        </div>
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <form id="formNganSach">
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="bi bi-cash-coin"></i></span>
                        <input type="number" class="form-control form-control-lg" id="inputNganSach" required placeholder="Nhập số tiền...">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-3 py-3 fw-bold">Lưu thay đổi</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './inc/config.js';
    import { collection, query, where, getDocs, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';

    $(function(){ $('#navbar').load('inc/navbar.html'); });
    const formatMoney = (a) => new Intl.NumberFormat('vi-VN').format(a) + ' đ';
    const date = new Date(); const mStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    let cUser = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "dangnhap.html"; return; }
        
        // BẢO VỆ ĐI TUẦN
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists() && userSnap.data().status === 'locked') { await signOut(auth); window.location.href = "dangnhap.html"; return; }

        cUser = user; await load();
    });

    async function load() {
        const bSnap = await getDoc(doc(db, "ngansach", `${cUser.uid}_${mStr}`));
        let ns = bSnap.exists() ? bSnap.data().sotien : 0;
        document.getElementById('inputNganSach').value = ns > 0 ? ns : '';

        const snap = await getDocs(query(collection(db, "chitieu"), where("uid", "==", cUser.uid)));
        let dc = 0; snap.forEach(d => { if (d.data().ngay?.startsWith(mStr)) dc += d.data().sotien||0; });

        let cl = ns - dc, p = ns > 0 ? Math.round((dc/ns)*100) : 0; if (p>100) p=100;
        
        document.getElementById('txtNganSach').innerText = formatMoney(ns);
        document.getElementById('txtDaChi').innerText = formatMoney(dc);
        document.getElementById('txtConLai').innerText = formatMoney(cl);
        
        const pb = document.getElementById('progressBar'); pb.style.width = p+'%'; pb.innerText = p+'%';
        pb.className = 'progress-bar'; document.getElementById('txtConLai').className = 'fw-bold fs-3 text-success';
        if(p>=90){ pb.classList.add('bg-danger'); document.getElementById('txtConLai').classList.replace('text-success', 'text-danger'); }
        else if(p>=70){ pb.classList.add('bg-warning'); } else { pb.classList.add('bg-success'); }

        document.getElementById('loading-screen').classList.add('d-none'); document.getElementById('main-content').classList.remove('d-none');
    }

    document.getElementById('formNganSach').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('main-content').classList.add('d-none'); document.getElementById('loading-screen').classList.remove('d-none');
        await setDoc(doc(db, "ngansach", `${cUser.uid}_${mStr}`), { uid: cUser.uid, thangNam: mStr, sotien: parseFloat(document.getElementById('inputNganSach').value) }, { merge: true });
        await load();
    });
</script>
</body>
</html>
